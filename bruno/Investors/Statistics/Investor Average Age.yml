info:
  name: Investor Average Age
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/investors/statistics/average-age"
  body:
    type: multipart-form
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns average age", function () {
          expect(res.status).to.equal(200);
          expect(res.body).to.have.property("average_age");
          expect(res.body.average_age).to.be.a("number");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
