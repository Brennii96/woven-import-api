info:
  name: Investor Total Investments
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/investments/statistics/total"
  body:
    type: multipart-form
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns total investments count", function () {
            expect(res.status).to.equal(200);
            expect(res.body.total_investments).to.be.a("number");
          });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
