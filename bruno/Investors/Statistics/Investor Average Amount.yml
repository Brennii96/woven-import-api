info:
  name: Investor Average Amount
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/api/investments/statistics/average-amount"
  body:
    type: multipart-form
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns 200", function () {
            expect(res.status).to.equal(200);
          });

          test("returns average age", function () {
            expect(res.body).to.have.property("average_investment_amount");
            expect(res.body.average_investment_amount).to.be.a("string");
          });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
