info:
  name: Investors export
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/api/investors/"
  body:
    type: multipart-form
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns investors", function () {
            expect(res.status).to.equal(200);
            expect(res.body.data).to.be.an("array");

            if (res.body.data.length > 0) {
              expect(res.body.data[0]).to.have.all.keys(
                "investor_id",
                "name",
                "age",
                "investment_amount"
              );
            }
          });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
